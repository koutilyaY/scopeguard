name: scopeguard

x-api-env: &api-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  SECRET_KEY: ${SECRET_KEY:-dev-only-secret-key-change-in-production}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scopeguard}:${POSTGRES_PASSWORD:-scopeguard-dev-password}@postgres:5432/${POSTGRES_DB:-scopeguard}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-scopeguard}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-scopeguard-dev-secret}
  MINIO_BUCKET: ${MINIO_BUCKET:-scopeguard-documents}
  MINIO_SECURE: "false"
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:8b}
  OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
  OLLAMA_EMBED_DIMENSIONS: ${OLLAMA_EMBED_DIMENSIONS:-768}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scopeguard}
      POSTGRES_USER: ${POSTGRES_USER:-scopeguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scopeguard-dev-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scopeguard} -d ${POSTGRES_DB:-scopeguard}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-scopeguard}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-scopeguard-dev-secret}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9003}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:${MAILPIT_HOST_PORT:-8025}:8025"   # web UI
      - "127.0.0.1:${MAILPIT_SMTP_HOST_PORT:-1025}:1025"   # SMTP
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 6

  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT:-11435}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 8

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -d celery@$$HOSTNAME --timeout 10 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the build: Next resolves rewrite destinations at build time.
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    environment:
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    healthcheck:
      # node:20-slim ships neither wget nor curl — use the node runtime itself.
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/login',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
