# Development overrides: infrastructure only, run api/web on the host with hot reload.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres redis minio mailpit
# then:
#   make dev-api   (uvicorn --reload on :8000)
#   make dev-web   (next dev on :3000)
#   make dev-worker
services:
  postgres:
    ports: !override
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
  redis:
    ports: !override
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
  minio:
    ports: !override
      - "127.0.0.1:${MINIO_HOST_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9003}:9001"
  api:
    profiles: ["full"]
  worker:
    profiles: ["full"]
  web:
    profiles: ["full"]
